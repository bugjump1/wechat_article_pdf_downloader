name: wechat_article_pdf_downloader
description: Material 3 app for exporting public WeChat article pages to PDF.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter
  cross_file: ^0.3.4+2
  file_selector: ^1.1.0
  path_provider: ^2.1.5
  share_plus: ^13.2.0

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
