name: Build Flutter App

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Generate Android project files
        shell: bash
        run: |
          mkdir -p /tmp/wechat-android-backup/app/src/main/kotlin/com/bugjump/wechatpdf
          mkdir -p /tmp/wechat-android-backup/app/src/main/res/drawable
          mkdir -p /tmp/wechat-android-backup/app/src/main/res/values
          [ -f android/settings.gradle ] && cp android/settings.gradle /tmp/wechat-android-backup/settings.gradle
          [ -f android/build.gradle ] && cp android/build.gradle /tmp/wechat-android-backup/build.gradle
          [ -f android/gradle.properties ] && cp android/gradle.properties /tmp/wechat-android-backup/gradle.properties
          [ -f android/app/build.gradle ] && cp android/app/build.gradle /tmp/wechat-android-backup/app/build.gradle
          [ -f android/app/src/main/AndroidManifest.xml ] && cp android/app/src/main/AndroidManifest.xml /tmp/wechat-android-backup/app/src/main/AndroidManifest.xml
          [ -f android/app/src/main/kotlin/com/bugjump/wechatpdf/MainActivity.kt ] && cp android/app/src/main/kotlin/com/bugjump/wechatpdf/MainActivity.kt /tmp/wechat-android-backup/app/src/main/kotlin/com/bugjump/wechatpdf/MainActivity.kt
          [ -f android/app/src/main/res/drawable/ic_launcher.xml ] && cp android/app/src/main/res/drawable/ic_launcher.xml /tmp/wechat-android-backup/app/src/main/res/drawable/ic_launcher.xml
          [ -f android/app/src/main/res/values/styles.xml ] && cp android/app/src/main/res/values/styles.xml /tmp/wechat-android-backup/app/src/main/res/values/styles.xml
          flutter create --platforms=android --project-name wechat_article_pdf_downloader --org com.bugjump .
          [ -f /tmp/wechat-android-backup/settings.gradle ] && cp /tmp/wechat-android-backup/settings.gradle android/settings.gradle
          [ -f /tmp/wechat-android-backup/build.gradle ] && cp /tmp/wechat-android-backup/build.gradle android/build.gradle
          [ -f /tmp/wechat-android-backup/gradle.properties ] && cp /tmp/wechat-android-backup/gradle.properties android/gradle.properties
          [ -f /tmp/wechat-android-backup/app/build.gradle ] && cp /tmp/wechat-android-backup/app/build.gradle android/app/build.gradle
          [ -f /tmp/wechat-android-backup/app/src/main/AndroidManifest.xml ] && cp /tmp/wechat-android-backup/app/src/main/AndroidManifest.xml android/app/src/main/AndroidManifest.xml
          mkdir -p android/app/src/main/kotlin/com/bugjump/wechatpdf
          [ -f /tmp/wechat-android-backup/app/src/main/kotlin/com/bugjump/wechatpdf/MainActivity.kt ] && cp /tmp/wechat-android-backup/app/src/main/kotlin/com/bugjump/wechatpdf/MainActivity.kt android/app/src/main/kotlin/com/bugjump/wechatpdf/MainActivity.kt
          [ -f /tmp/wechat-android-backup/app/src/main/res/drawable/ic_launcher.xml ] && cp /tmp/wechat-android-backup/app/src/main/res/drawable/ic_launcher.xml android/app/src/main/res/drawable/ic_launcher.xml
          [ -f /tmp/wechat-android-backup/app/src/main/res/values/styles.xml ] && cp /tmp/wechat-android-backup/app/src/main/res/values/styles.xml android/app/src/main/res/values/styles.xml

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Get dependencies
        run: flutter pub get

      - name: Build debug APK
        shell: bash
        run: |
          set +e
          flutter build apk --debug
          build_status=$?
          set -e

          if [ -f build/app/outputs/flutter-apk/app-debug.apk ]; then
            exit 0
          fi

          echo "Flutter did not place the APK at the expected path. Searching build output..."
          found_apk="$(find build -name '*debug*.apk' -print -quit)"
          if [ -n "$found_apk" ] && [ -f "$found_apk" ]; then
            mkdir -p build/app/outputs/flutter-apk
            cp "$found_apk" build/app/outputs/flutter-apk/app-debug.apk
            echo "Copied $found_apk to build/app/outputs/flutter-apk/app-debug.apk"
            exit 0
          fi

          echo "Trying direct Gradle debug build..."
          if [ -f android/gradlew ]; then
            chmod +x android/gradlew
            (cd android && ./gradlew :app:assembleDebug --stacktrace)
          else
            (cd android && gradle :app:assembleDebug --stacktrace)
          fi

          found_apk="$(find android build -name '*.apk' -print -quit)"
          if [ -n "$found_apk" ] && [ -f "$found_apk" ]; then
            mkdir -p build/app/outputs/flutter-apk
            cp "$found_apk" build/app/outputs/flutter-apk/app-debug.apk
            echo "Copied $found_apk to build/app/outputs/flutter-apk/app-debug.apk"
            exit 0
          fi

          exit "$build_status"

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: wechat-pdf-android-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          if-no-files-found: error

  build-windows:
    name: Build Windows EXE
    runs-on: windows-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Generate Windows project files
        run: flutter create --platforms=windows --project-name wechat_article_pdf_downloader --org com.bugjump .

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Get dependencies
        run: flutter pub get

      - name: Build Windows release
        run: flutter build windows --release

      - name: Upload Windows EXE package
        uses: actions/upload-artifact@v4
        with:
          name: wechat-pdf-windows-release
          path: build/windows/x64/runner/Release/**
          if-no-files-found: error

  build-ios-unsigned:
    name: Build iOS unsigned IPA for self-signing
    runs-on: macos-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Generate iOS project files
        shell: bash
        run: |
          mkdir -p /tmp/wechat-ios-backup/Runner
          [ -f ios/Podfile ] && cp ios/Podfile /tmp/wechat-ios-backup/Podfile
          [ -f ios/Runner/AppDelegate.swift ] && cp ios/Runner/AppDelegate.swift /tmp/wechat-ios-backup/Runner/AppDelegate.swift
          [ -f ios/Runner/Info.plist ] && cp ios/Runner/Info.plist /tmp/wechat-ios-backup/Runner/Info.plist
          flutter create --platforms=ios --project-name wechat_article_pdf_downloader --org com.bugjump .
          [ -f /tmp/wechat-ios-backup/Podfile ] && cp /tmp/wechat-ios-backup/Podfile ios/Podfile
          [ -f /tmp/wechat-ios-backup/Runner/AppDelegate.swift ] && cp /tmp/wechat-ios-backup/Runner/AppDelegate.swift ios/Runner/AppDelegate.swift
          [ -f /tmp/wechat-ios-backup/Runner/Info.plist ] && cp /tmp/wechat-ios-backup/Runner/Info.plist ios/Runner/Info.plist

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Get dependencies
        run: flutter pub get

      - name: Reset iOS CocoaPods state
        shell: bash
        run: |
          rm -rf ios/Pods ios/Podfile.lock
          cd ios
          pod install --repo-update

      - name: Build iOS app without codesign
        run: flutter build ios --release --no-codesign

      - name: Create unsigned IPA
        run: |
          rm -rf Payload unsigned-wechat-pdf.ipa
          mkdir -p Payload
          cp -R build/ios/iphoneos/Runner.app Payload/Runner.app
          zip -qry unsigned-wechat-pdf.ipa Payload

      - name: Upload unsigned IPA
        uses: actions/upload-artifact@v4
        with:
          name: wechat-pdf-ios-unsigned-ipa
          path: unsigned-wechat-pdf.ipa
          if-no-files-found: error
